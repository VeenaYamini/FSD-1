<!DOCTYPE html>
<html>
<head>
    <title>Math Object</title>
</head>
<body>

<script>
let num = 25;

document.write("Square Root: " + Math.sqrt(num) + "<br>");
document.write("Power (5^3): " + Math.pow(5,3) + "<br>");
document.write("Random Number: " + Math.random() + "<br>");
document.write("Ceil: " + Math.ceil(4.3) + "<br>");
document.write("Floor: " + Math.floor(4.7) + "<br>");
document.write("PI Value: " + Math.PI + "<br>");
</script>

</body>
</html>
