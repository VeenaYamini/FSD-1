<!DOCTYPE html>
<html>
<head>
    <title>Types of CSS</title>

    <!-- Internal CSS -->
    <style>
        p {
            color: green;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>WELCOME TO DEMONSTRATION OF TYPES OF CSS</h1>
<p style="color:red;">Inline CSS applied here.</p>
<p>Internal CSS applied to this paragraph.</p>
<span>External CSS applied to this line</span>
</body>
</html>
