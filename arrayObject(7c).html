<!DOCTYPE html>
<html>
<head>
    <title>Array Object</title>
</head>
<body>

<script>
let arr = [10, 20, 30, 40];

document.write("Array Length: " + arr.length + "<br>");

arr.push(50);
document.write("After Push: " + arr + "<br>");

arr.pop();
document.write("After Pop: " + arr + "<br>");

arr.sort();
document.write("After Sort: " + arr + "<br>");

arr.reverse();
document.write("After Reverse: " + arr + "<br>");
</script>

</body>
</html>
