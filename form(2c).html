<!DOCTYPE html>

<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width-device-width, initial-scale = 1.0">
        <title>Registration page</title>
        <link rel="stylesheet" href="demo.css">
    </head>
    <body>
        <div class="bg-image"></div>
       <form>
            <h1>Registration Form</h1><br>
            <label>Name:</label>
                <input type = "text" placeholder = "Enter your name" required><br><br>
            <label>Email:</label>
                <input type = "email" placeholder = "Enter your email" required><br><br>
            <label>Passowrd:</label>
                <input type = "password" placeholder = "Enter your password" required><br><br>
            <label>Gender:</label><br>
                <input type = "radio" name = "Gender"><label>Male</label>
                <input type = "radio" name = "Gender"><label>Female</label><br><br>
            <label>Date of birth:</label>
                <input type ="date"><br><br>
            <label>Favourite number:</label>
                <input type = "number" placeholder = "Enter favourite number"><br><br>
            <label>Favourite color:</label>
                <input type ="color"><br><br>
            <label>Website link:</label>
                <input type ="url" placeholder = "Enter website link"><br><br>
            <label>Batch name:</label>
            <select>
                <option>---</option>
               <option>CIC-A</option> 
               <option>CIC-B</option> 
            </select><br><br>
            <label>Upload your file</label><br><br>
                <input type ="file"><br><br>
                <input type = "checkbox">
            <label>I agree to all the terms and conditions</label><br><br>
               <button type = "submit">Submit</button>
            <button type = "reset">Reset</button><br> 
        </form> 
    </body>
</html>
