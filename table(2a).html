<!DOCTYPE html>
<html>
<head>
    <title>Rowspan and Colspan Example</title>
</head>
<body>

<h2>HTML Table</h2>

<table border="2">

    <tr>
        <th rowspan="2">Student ID</th>
        <th colspan="3">Marks</th>
    </tr>

    <tr>
        <th>Maths</th>
        <th>Physics</th>
        <th>Chemistry</th>
    </tr>

    <tr>
        <td>101</td>
        <td>85</td>
        <td>78</td>
        <td>88</td>
    </tr>

    <tr>
        <td>102</td>
        <td>90</td>
        <td>82</td>
        <td>80</td>
    </tr>
    <tr>
        <td>103</td>
        <td>99</td>
        <td>94</td>
        <td>96</td>
    </tr>
    <tr>
        <td>104</td>
        <td>100</td>
        <td>100</td>
        <td>100</td>
    </tr>
    <tr>
        <td>105</td>
        <td>89</td>
        <td>85</td>
        <td>87</td>
    </tr>

</table>

</body>
</html>
