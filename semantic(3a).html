<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Semantic Tags</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }
        header, footer {
            background-color: #3a201ad0;
            color: white;
            text-align: center;
            padding: 10px;
        }
        nav {
            background-color: #dedee1;
            padding: 50px;
        }
        section, aside {
            background-color: #fff;
            margin: 10px;
            padding: 10px;
        }
        figure {
            text-align: center;
        }
    </style>
</head>

<body>
<header>
    <h1>My Website</h1>
</header>

<nav>
    <a href="#">Home</a> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; |&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <a href="#">About</a> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <a href="#">Services</a> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <a href="#">Gallery</a> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <a href="#">Blog</a> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <a href="#">Contact Us</a>
</nav>

<main>
    <section>
        <article>
            <h2>Article Section</h2>
            <p>This is an article inside a section.</p>
        </article>
    </section>

    <aside>
        <p>This is aside content.</p>
    </aside>

    <figure>
        <img src="images/image4.jpg" width="200">
        <figcaption>Sample Image</figcaption>
    </figure>
</main>

<footer>
    <p>© 2026 HTML5 Lab</p>
</footer>

</body>
</html>
