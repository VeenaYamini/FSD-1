<!DOCTYPE html>
<html>
<head>
    <title>String Object</title>
</head>
<body>

<script>
let str = "JavaScript Programming";

document.write("Length: " + str.length + "<br>");
document.write("Uppercase: " + str.toUpperCase() + "<br>");
document.write("Lowercase: " + str.toLowerCase() + "<br>");
document.write("Substring(0,10): " + str.substring(0,10) + "<br>");
document.write("Index of 'Script': " + str.indexOf("Script") + "<br>");
document.write("Replace: " + str.replace("Programming","Language") + "<br>");
</script>

</body>
</html>
