<!DOCTYPE html>
<html>
<head>
    <title>Different ways of Displaying Output</title>
</head>

<body>

    <h2>JavaScript Output</h2>

    <div id="box"></div>
    <p id="text"></p>

    <button onclick="showAlert()">Show Alert</button>
    <button onclick="showText()">Show Text</button>
    <button onclick="showHTML()">Show HTML</button>
    <button onclick="showConsole()">Show Console</button>
    <button onclick="createElementOutput()">Create Element</button>

    <script>

        function showAlert() {
            alert("This is output using alert()");
        }

        function showText() {
            document.getElementById("text").textContent =
                "This is output using textContent";
        }

        function showHTML() {
            document.getElementById("box").innerHTML =
                "<b>This is output using innerHTML</b>";
        }

        function showConsole() {
            console.log("This is output using console.log()");
        }

        function createElementOutput() {
            let p = document.createElement("p");
            p.textContent =
                "This is output using createElement() & appendChild()";
            document.body.appendChild(p);
        }

    </script>

</body>
</html>
