<!DOCTYPE html>
<html>
<head>
    <title>Taking Input Method</title>
</head>

<body>

    <h2>Different Types of Taking Input (Method)</h2>

    Enter your age:
    <input type="number" id="age">
    <br><br>

    Enter your favourite subject:
    <input type="text" id="subject">
    <br><br>

    <button onclick="getInput()">Submit</button>

    <p id="result"></p>

    <script>

        function getInput() {

            var age = document.getElementById("age").value;
            var subject = document.getElementById("subject").value;

            var likeJS = confirm("Do you like JavaScript?");
            var country = prompt("Enter your country");

            document.getElementById("result").innerHTML =
                "Age: " + age + "<br>" +
                "Fav Subject: " + subject + "<br>" +
                "Like JavaScript: " + likeJS + "<br>" +
                "Country: " + country;
        }

    </script>

</body>
</html>
